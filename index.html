<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spam Email Detector</title>

<style>
    body {
        font-family: Arial, sans-serif;
        background: linear-gradient(135deg, #667eea, #764ba2);
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
    }

    .container {
        background: white;
        width: 400px;
        padding: 25px;
        border-radius: 12px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        text-align: center;
    }

    h2 {
        margin-bottom: 20px;
        color: #333;
    }

    textarea {
        width: 100%;
        height: 120px;
        padding: 10px;
        border-radius: 8px;
        border: 1px solid #ccc;
        resize: none;
        font-size: 14px;
        margin-bottom: 15px;
    }

    button {
        background: #667eea;
        color: white;
        border: none;
        padding: 10px 20px;
        border-radius: 8px;
        cursor: pointer;
        font-size: 16px;
        transition: 0.3s;
    }

    button:hover {
        background: #5a67d8;
    }

    .result {
        margin-top: 15px;
        font-weight: bold;
        font-size: 18px;
    }

    .spam {
        color: red;
    }

    .not-spam {
        color: green;
    }
</style>

</head>
<body>

<div class="container">
    <h2>Spam Email Detector</h2>
    <textarea id="emailText" placeholder="Paste your email content here..."></textarea>
    <button onclick="checkSpam()">Check Email</button>
    <div id="result" class="result"></div>
</div>

<script>
function checkSpam() {
    const text = document.getElementById("emailText").value.toLowerCase();
    const resultDiv = document.getElementById("result");

    const spamKeywords = [
        "win money", "free", "click here", 
        "urgent", "lottery", "claim now", 
        "congratulations", "prize"
    ];

    let isSpam = spamKeywords.some(keyword => text.includes(keyword));

    if(text.trim() === "") {
        resultDiv.textContent = "Please enter email content.";
        resultDiv.className = "result";
        return;
    }

    if(isSpam) {
        resultDiv.textContent = "⚠ This email is likely SPAM!";
        resultDiv.className = "result spam";
    } else {
        resultDiv.textContent = "✓ This email appears safe.";
        resultDiv.className = "result not-spam";
    }
}
</script>

</body>
</html>
